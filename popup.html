<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Rewind</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      color-scheme: dark;
      --bg: #020617;
      --panel: #0f172a;
      --text: #f8fafc;
      --muted: #94a3b8;
      --border: rgba(255,255,255,0.12);
      --accent: #60a5fa;
      --accent2: #2563eb;
      --good: #34d399;
      --bad: #fb7185;
    }

    * {
      box-sizing: border-box;
    }

    body {
      width: 350px;
      margin: 0;
      padding: 14px;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(96,165,250,0.20), transparent 35%),
        linear-gradient(135deg, #020617, #0f172a);
      color: var(--text);
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .brand-title {
      font-size: 16px;
      font-weight: 850;
      letter-spacing: -0.02em;
    }

    .brand-subtitle {
      margin-top: 3px;
      font-size: 12px;
      color: var(--muted);
    }

    .switch {
      position: relative;
      width: 50px;
      height: 28px;
      flex: 0 0 auto;
    }

    .switch input {
      width: 0;
      height: 0;
      opacity: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      border-radius: 999px;
      background: rgba(148,163,184,0.35);
      border: 1px solid var(--border);
      transition: 160ms ease;
    }

    .slider::before {
      content: "";
      position: absolute;
      width: 22px;
      height: 22px;
      left: 2px;
      top: 2px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 8px 20px rgba(0,0,0,0.32);
      transition: 160ms ease;
    }

    .switch input:checked + .slider {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
    }

    .switch input:checked + .slider::before {
      transform: translateX(22px);
    }

    .card {
      border: 1px solid var(--border);
      background: rgba(15,23,42,0.82);
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 18px 45px rgba(0,0,0,0.32);
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      background: rgba(255,255,255,0.08);
      color: #cbd5e1;
      margin-bottom: 12px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
    }

    .status-pill.good .dot {
      background: var(--good);
    }

    .status-pill.bad .dot {
      background: var(--bad);
    }

    .row {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 10px;
      margin: 10px 0;
      align-items: start;
    }

    .label {
      color: var(--muted);
      font-size: 12px;
    }

    .value {
      font-size: 12px;
      font-weight: 700;
      text-align: right;
      overflow-wrap: anywhere;
      line-height: 1.35;
    }

    .message {
      margin-top: 12px;
      padding: 11px;
      border-radius: 13px;
      background: rgba(255,255,255,0.06);
      color: #cbd5e1;
      font-size: 12px;
      line-height: 1.45;
    }

    .message.good {
      color: #bbf7d0;
      border: 1px solid rgba(52,211,153,0.18);
      background: rgba(52,211,153,0.12);
    }

    .message.bad {
      color: #fecdd3;
      border: 1px solid rgba(251,113,133,0.18);
      background: rgba(251,113,133,0.12);
    }

    button {
      width: 100%;
      margin-top: 12px;
      border: 0;
      border-radius: 14px;
      padding: 13px 14px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 900;
      color: #f8fafc;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 12px 30px rgba(37,99,235,0.30);
      transition: 120ms ease;
    }

    button:hover:not(:disabled) {
      filter: brightness(1.08);
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      box-shadow: none;
    }

    .footer {
      margin-top: 10px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }
  </style>
</head>

<body>
  <header class="top">
    <div>
      <div class="brand-title">Rewind</div>
      <div class="brand-subtitle">Recover the page you lost</div>
    </div>

    <label class="switch" title="Enable globally">
      <input id="enabledToggle" type="checkbox">
      <span class="slider"></span>
    </label>
  </header>

  <main class="card">
    <div id="statusPill" class="status-pill">
      <span class="dot"></span>
      <span id="statusText">Checking…</span>
    </div>

    <div class="row">
      <div class="label">Previous URL</div>
      <div id="previousUrl" class="value">—</div>
    </div>

    <div class="row">
      <div class="label">Saved</div>
      <div id="savedAt" class="value">—</div>
    </div>

    <div class="row">
      <div class="label">Size</div>
      <div id="snapshotSize" class="value">—</div>
    </div>

    <div id="messageBox" class="message">
      Open a normal web page, then navigate quickly. Rewind will preserve the immediate previous state.
    </div>

    <button id="restoreButton" disabled>
      Restore Last Page State
    </button>
  </main>

  <div class="footer">
    Snapshot HTML is injected into a sandboxed overlay iframe. Scripts are stripped and disabled.
  </div>

  <script src="popup.js"></script>
</body>
</html>
